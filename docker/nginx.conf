server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every unknown path falls back to index.html so
    # client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tiny cache window for the entry HTML so users always pick up new
    # bundles after a redeploy; long cache for hashed assets.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
